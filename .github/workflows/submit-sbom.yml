# This workflow does essentially the same thing as the "Automatic Dependency Submission" workflow that runs when Dependabot is enabled.
# But this repo doesn't use Dependabot anymore, so I implemented is manually.
name: 'Submit SBOM'
on:
  workflow_dispatch:
  pull_request:
    branches: main
  push:
    branches: main

permissions:
  id-token: write
  contents: write

jobs:
  submit-sbom:
    runs-on: ubuntu-latest
    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v6

    - name: 🕒 Cache NuGet Packages
      uses: actions/cache@v5
      id: cache
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json

    - name: 🛠️ Restore
      run: dotnet restore

    - name: Component detection
      uses: advanced-security/component-detection-dependency-submission-action@v0.1.1