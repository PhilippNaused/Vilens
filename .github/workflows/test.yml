name: Unit Test

on:
  workflow_dispatch:
  pull_request:
    branches: main
  push:
    branches: main

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os:
        - ubuntu-latest
        - ubuntu-24.04-arm
        - windows-latest
        # - windows-11-arm
    runs-on: ${{ matrix.os }}

    steps:
    - name: ⤵️ Checkout Source
      uses: actions/checkout@v7

    - name: 🕒 Cache NuGet Packages
      uses: actions/cache@v6
      id: cache
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('Directory.Packages.props', 'global.json') }}
        restore-keys: |
          ${{ runner.os }}-nuget

    - name: 🛠️ Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        global-json-file: global.json
        dotnet-version: |
          8.0.x
          9.0.x

    # cspell:ignore devel
    - name: 🛠️ Install mono
      if: startsWith(matrix.os, 'ubuntu')
      run: |
        sudo apt-get update
        sudo apt-get install -y mono-devel

    - name: 🛠️ Restore dependencies
      run: dotnet restore

    - name: 🔨 Build
      run: dotnet build

    - name: 🧪 Test
      run: dotnet test --no-progress --no-build

    - name: 🔨 Build Dummy projects
      run: dotnet build Tests/Dummies/Dummies.slnx

    - name: 🧪 Test Dummy projects
      run: dotnet test --solution Tests/Dummies/Dummies.slnx --no-progress --no-build
